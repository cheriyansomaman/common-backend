[build]
  functions = "netlify/functions"
  publish = "public"

[[redirects]]
  from = "/api/name"
  to = "/.netlify/functions/name"
  status = 200

[[redirects]]
  from = "/api/trigger-workflow"
  to = "/.netlify/functions/trigger-workflow"
  status = 200

[[redirects]]
  from = "/api/trigger-status"
  to = "/.netlify/functions/trigger-status"
  status = 200

[functions."scheduled-trigger-workflow"]
  schedule = "*/10 * * * *"
